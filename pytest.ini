[pytest]
testpaths = tests
# Legacy interactive/manual scripts are not pytest-compatible; run them by hand.
addopts = --ignore=tests/test_auth.py --ignore=tests/test_dependencies.py --ignore=tests/test_mcp_auth.py --ignore=tests/test_sage_auth.py --ignore=tests/test_server.py --ignore=tests/test_image_proxy.py --ignore=tests/test.py -ra
asyncio_mode = auto
filterwarnings =
    ignore::DeprecationWarning
